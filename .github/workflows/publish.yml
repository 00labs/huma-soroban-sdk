name: NPM Packages Publishing

on:
  pull_request:
    types: [closed]
    branches: ["main", "develop"]
  workflow_dispatch:
    inputs:
      branch:
        description: "Target branch (main or develop)"
        required: true
        type: choice
        options:
          - main
          - develop

permissions:
  id-token: write # Required for OIDC
  contents: write # Required for git push operations

jobs:
  publish:
    if: |
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true) ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.CI_TOKEN_PUBLIC }}
          fetch-depth: 0

      - name: Determine target branch
        id: determine_branch
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            TARGET_BRANCH="${{ github.event.inputs.branch }}"
          else
            TARGET_BRANCH="${{ github.event.pull_request.base.ref }}"
          fi
          echo "TARGET_BRANCH=${TARGET_BRANCH}" >> $GITHUB_ENV
          echo "Target branch: ${TARGET_BRANCH}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.3.0
          registry-url: "https://registry.npmjs.org"
          cache: "yarn"

      - name: Cache Yarn dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/yarn
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build packages
        run: yarn build:all

      - name: Test packages
        run: yarn test:all

      - name: Configure Git User
        run: |
          git config --global user.email "ci@huma.finance"
          git config --global user.name "humaci"

      # Beta publishing (for develop branch)
      - name: Publish beta packages
        if: env.TARGET_BRANCH == 'develop'
        run: |
          yarn lerna:publish:canary --yes --force-publish

      # Production publishing (for main branch)
      - name: Publish production packages
        if: env.TARGET_BRANCH == 'main'
        run: |
          yarn lerna:publish --yes --force-publish

      - name: Synchronize lerna version bump commit with develop branch
        if: env.TARGET_BRANCH == 'main'
        run: |
          git fetch --unshallow
          git checkout develop
          git pull
          git merge --no-ff main -m "Auto-merge main back to develop"
          git push
